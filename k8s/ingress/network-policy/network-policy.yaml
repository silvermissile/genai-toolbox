---
# ====================
# 使用说明
# ====================
# 
# 1. 根据需求选择合适的策略（可以组合使用）
# 
# 2. 修改配置：
#    - 将 "trusted-apps" 改为你的 namespace label
#    - 将 "frontend"/"backend" 改为你的 Pod label
#    - 调整端口号（如果 toolbox 使用其他端口）
# 
# 3. 应用配置：
#    kubectl apply -f network-policy.yaml
# 
# 4. 验证：
#    kubectl get networkpolicy -n mcp-toolbox
#    kubectl describe networkpolicy toolbox-allow-from-namespace -n mcp-toolbox
# 
# 5. 测试连接：
#    # 从允许的 namespace 测试（应该成功）
#    kubectl run test-pod --rm -it \
#      --image=curlimages/curl \
#      --namespace=trusted-apps \
#      -- curl http://toolbox.mcp-toolbox.svc.cluster.local:5000/health
#    
#    # 从不允许的 namespace 测试（应该超时）
#    kubectl run test-pod --rm -it \
#      --image=curlimages/curl \
#      --namespace=default \
#      -- curl --max-time 5 http://toolbox.mcp-toolbox.svc.cluster.local:5000/health
