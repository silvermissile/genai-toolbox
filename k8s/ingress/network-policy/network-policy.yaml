# NetworkPolicy 配置
# 用于限制 Toolbox 的网络访问（仅集群内部访问）

# 策略 1: 只允许来自特定 namespace 的流量
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: toolbox-allow-from-namespace
  namespace: mcp-toolbox
spec:
  podSelector:
    matchLabels:
      app: toolbox
  policyTypes:
  - Ingress
  ingress:
  # 允许来自特定 namespace 的所有 Pod
  - from:
    - namespaceSelector:
        matchLabels:
          name: trusted-apps  # 修改为你的信任 namespace
    ports:
    - protocol: TCP
      port: 5000

---
# 策略 2: 只允许来自特定 Pod 的流量
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: toolbox-allow-from-pods
  namespace: mcp-toolbox
spec:
  podSelector:
    matchLabels:
      app: toolbox
  policyTypes:
  - Ingress
  ingress:
  # 允许来自标记为 frontend 的 Pod
  - from:
    - podSelector:
        matchLabels:
          role: frontend
    ports:
    - protocol: TCP
      port: 5000
  # 允许来自标记为 backend 的 Pod
  - from:
    - podSelector:
        matchLabels:
          role: backend
    ports:
    - protocol: TCP
      port: 5000

---
# 策略 3: 允许来自 Ingress Controller（如果需要外部访问）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: toolbox-allow-from-ingress
  namespace: mcp-toolbox
spec:
  podSelector:
    matchLabels:
      app: toolbox
  policyTypes:
  - Ingress
  ingress:
  # 允许来自 Traefik Ingress Controller
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
    ports:
    - protocol: TCP
      port: 5000

---
# 策略 4: 完全隔离（拒绝所有外部流量，仅 DNS 和健康检查）
